name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install .
      - name: Dry-run — verify step matching
        run: behave examples/ --dry-run

  reporting-tests:
    name: Reporting unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with test extras
        run: pip install ".[test]"
      - name: Run reporting unit tests
        run: pytest tests/reporting/ -q

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [validate, reporting-tests]
    permissions:
      models: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install .
      - name: Install Playwright browser
        run: playwright install chromium
      - name: Cache Alumnium LLM responses
        uses: actions/cache@v4
        with:
          path: .alumnium/cache/
          key: alumnium-cache-${{ github.sha }}
          restore-keys: alumnium-cache-
      - name: Run examples
        continue-on-error: true
        run: behave examples/ --no-capture
        env:
          OPENAI_API_KEY: ${{ github.token }}
          OPENAI_BASE_URL: https://models.inference.ai.azure.com
          ALUMNIUM_MODEL: openai/gpt-4o-mini
      - name: Upload Alumnium report
        if: always()
        id: upload-report
        uses: actions/upload-artifact@v4
        with:
          name: alumnium-report
          path: reports/
      - name: Report artifact URL
        if: always()
        run: |
          echo "## Alumnium Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Download:** ${{ steps.upload-report.outputs.artifact-url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Extract the zip and open \`run_*/report.html\` in a browser." >> $GITHUB_STEP_SUMMARY
