name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install .
      - name: Dry-run — verify step matching
        run: behave examples/ --dry-run

  reporting-tests:
    name: Reporting unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with test extras
        run: pip install ".[test]"
      - name: Run reporting unit tests
        run: pytest tests/reporting/ -q

  examples:
    name: Examples
    runs-on: ubuntu-latest
    needs: [validate, reporting-tests]
    permissions:
      models: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install .
      - name: Install Playwright browser
        run: playwright install chromium
      - name: Cache Alumnium LLM responses
        uses: actions/cache@v4
        with:
          path: .alumnium/cache/
          key: alumnium-cache-${{ github.sha }}
          restore-keys: alumnium-cache-
      - name: Run examples
        continue-on-error: true
        run: behave examples/ --no-capture
        env:
          OPENAI_API_KEY: ${{ github.token }}
          OPENAI_BASE_URL: https://models.inference.ai.azure.com
          ALUMNIUM_MODEL: openai/gpt-4o-mini
      - name: Upload Alumnium report
        if: always()
        id: upload-report
        uses: actions/upload-artifact@v4
        with:
          name: alumnium-report
          path: reports/
      - name: Stage report for Pages
        if: always() && github.event_name != 'pull_request'
        run: |
          mkdir -p pages
          latest=$(find reports/ -maxdepth 1 -name 'run_*' -type d | sort | tail -1)
          [ -n "$latest" ] && cp -r "$latest"/. pages/

      - name: Upload Pages artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages/

      - name: Deploy to GitHub Pages
        if: always() && github.event_name != 'pull_request'
        id: deploy-pages
        uses: actions/deploy-pages@v4

      - name: Report URLs
        if: always()
        run: |
          echo "## Alumnium Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Live report:** ${{ steps.deploy-pages.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📦 **Download zip:** ${{ steps.upload-report.outputs.artifact-url }}" >> $GITHUB_STEP_SUMMARY
